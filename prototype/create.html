<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布约球 - 篮球约球</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/tdesign-icons@0.1.0/tdesign-icons.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <!-- 顶部导航栏 -->
    <div class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <button onclick="history.back()" class="p-2 text-gray-500 hover:text-gray-700 rounded-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
                <h1 class="text-lg font-semibold text-gray-900">发布约球</h1>
            </div>
            <button class="text-blue-500 text-sm font-medium hover:text-blue-600">发布</button>
        </div>
    </div>

    <!-- 表单内容 -->
    <div class="max-w-md mx-auto px-4 py-6">
        <!-- 选择场馆 -->
        <div class="bg-white rounded-lg p-4 mb-4 border border-gray-200">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-base font-medium text-gray-900">选择场馆</h3>
                <button class="text-blue-500 text-sm hover:text-blue-600">更换</button>
            </div>
            <div class="flex items-center space-x-3 p-3 bg-blue-50 rounded-lg border border-blue-200">
                <div class="w-12 h-12 bg-blue-500 rounded-lg flex items-center justify-center">
                    <span class="text-white text-lg font-bold">🏀</span>
                </div>
                <div class="flex-1">
                    <div class="font-medium text-gray-900">星光篮球场</div>
                    <div class="text-sm text-gray-500">距离 0.5km • 免费开放</div>
                </div>
                <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>

        <!-- 约球时间 -->
        <div class="bg-white rounded-lg p-4 mb-4 border border-gray-200">
            <h3 class="text-base font-medium text-gray-900 mb-3">约球时间</h3>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-2">日期</label>
                    <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option>今天</option>
                        <option>明天</option>
                        <option>后天</option>
                        <option>自定义</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">时间段</label>
                    <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option>19:00-21:00</option>
                        <option>20:00-22:00</option>
                        <option>14:00-16:00</option>
                        <option>15:00-17:00</option>
                        <option>自定义</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 约球人数 -->
        <div class="bg-white rounded-lg p-4 mb-4 border border-gray-200">
            <h3 class="text-base font-medium text-gray-900 mb-3">约球人数</h3>
            <div class="space-y-3">
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            </svg>
                        </div>
                        <div>
                            <div class="font-medium text-gray-900">半场 3v3</div>
                            <div class="text-sm text-gray-500">需要6人，还差3人</div>
                        </div>
                    </div>
                    <input type="radio" name="gameType" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                </div>
                
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            </svg>
                        </div>
                        <div>
                            <div class="font-medium text-gray-900">全场 5v5</div>
                            <div class="text-sm text-gray-500">需要10人，还差7人</div>
                        </div>
                    </div>
                    <input type="radio" name="gameType" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                </div>

                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            </svg>
                        </div>
                        <div>
                            <div class="font-medium text-gray-900">自由练习</div>
                            <div class="text-sm text-gray-500">人数不限，自由加入</div>
                        </div>
                    </div>
                    <input type="radio" name="gameType" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                </div>
            </div>
        </div>

        <!-- 技能要求 -->
        <div class="bg-white rounded-lg p-4 mb-4 border border-gray-200">
            <h3 class="text-base font-medium text-gray-900 mb-3">技能要求</h3>
            <div class="flex flex-wrap gap-2">
                <button class="skill-tag bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm hover:bg-blue-200 transition-colors" data-skill="新手友好">
                    新手友好
                </button>
                <button class="skill-tag bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-sm hover:bg-gray-200 transition-colors" data-skill="中等水平">
                    中等水平
                </button>
                <button class="skill-tag bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-sm hover:bg-gray-200 transition-colors" data-skill="高手切磋">
                    高手切磋
                </button>
                <button class="skill-tag bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-sm hover:bg-gray-200 transition-colors" data-skill="水平不限">
                    水平不限
                </button>
            </div>
        </div>

        <!-- 备注信息 -->
        <div class="bg-white rounded-lg p-4 mb-4 border border-gray-200">
            <h3 class="text-base font-medium text-gray-900 mb-3">备注信息</h3>
            <textarea 
                placeholder="描述一下约球的具体要求，比如：欢迎新手、需要有一定基础、带球来等..." 
                class="w-full border border-gray-300 rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                rows="4"
            ></textarea>
            <div class="flex justify-between items-center mt-2">
                <span class="text-xs text-gray-500">最多200字</span>
                <span class="text-xs text-gray-400">0/200</span>
            </div>
        </div>

        <!-- 联系方式 -->
        <div class="bg-white rounded-lg p-4 mb-4 border border-gray-200">
            <h3 class="text-base font-medium text-gray-900 mb-3">联系方式</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-2">微信昵称</label>
                    <input type="text" placeholder="请输入您的微信昵称" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">手机号码（选填）</label>
                    <input type="tel" placeholder="请输入手机号码" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
            </div>
        </div>

        <!-- 其他设置 -->
        <div class="bg-white rounded-lg p-4 mb-6 border border-gray-200">
            <h3 class="text-base font-medium text-gray-900 mb-3">其他设置</h3>
            <div class="space-y-3">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-5 5v-5z"></path>
                        </svg>
                        <span class="text-sm text-gray-700">开启提醒</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                    </label>
                </div>
                
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.367 2.684 3 3 0 00-5.367-2.684z"></path>
                        </svg>
                        <span class="text-sm text-gray-700">公开约球</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                    </label>
                </div>
            </div>
        </div>

        <!-- 发布按钮 -->
        <button class="w-full bg-blue-500 text-white py-4 px-6 rounded-lg font-medium text-lg hover:bg-blue-600 transition-colors mb-20">
            发布约球
        </button>
    </div>

    <!-- 底部导航栏 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200">
        <div class="max-w-md mx-auto px-4 py-2">
            <div class="flex justify-around">
                <a href="index.html" class="flex flex-col items-center py-2 text-gray-400">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <span class="text-xs">地图</span>
                </a>
                <a href="venue.html" class="flex flex-col items-center py-2 text-gray-400">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                    </svg>
                    <span class="text-xs">场馆</span>
                </a>
                <a href="create.html" class="flex flex-col items-center py-2 text-blue-500">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    <span class="text-xs">发布</span>
                </a>
                <a href="#" class="flex flex-col items-center py-2 text-gray-400">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    <span class="text-xs">我的</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // 技能标签选择
        document.querySelectorAll('.skill-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                // 移除其他标签的选中状态
                document.querySelectorAll('.skill-tag').forEach(t => {
                    t.classList.remove('bg-blue-100', 'text-blue-800');
                    t.classList.add('bg-gray-100', 'text-gray-700');
                });
                
                // 设置当前标签为选中状态
                this.classList.remove('bg-gray-100', 'text-gray-700');
                this.classList.add('bg-blue-100', 'text-blue-800');
            });
        });

        // 字数统计
        const textarea = document.querySelector('textarea');
        const charCount = document.querySelector('.text-xs.text-gray-400');
        
        textarea.addEventListener('input', function() {
            const length = this.value.length;
            charCount.textContent = `${length}/200`;
            
            if (length > 200) {
                this.value = this.value.substring(0, 200);
                charCount.textContent = '200/200';
            }
        });

        // 发布约球
        document.querySelector('button:contains("发布约球")').addEventListener('click', function() {
            // 这里可以添加表单验证逻辑
            alert('约球信息发布成功！');
            window.location.href = 'venue.html';
        });

        // 顶部发布按钮
        document.querySelector('button:contains("发布")').addEventListener('click', function() {
            // 这里可以添加表单验证逻辑
            alert('约球信息发布成功！');
            window.location.href = 'venue.html';
        });
    </script>
</body>
</html>
